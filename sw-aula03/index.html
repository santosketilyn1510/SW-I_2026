
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <form>
    <h1> Forms </h1>
    <br>
      <div class="form-floating">
        <label for="floatingname">Nome:</label>
        <input type="name" class="form-control" id="ValorName" placeholder="name">
      </div>

      <div class="form-floating mb-3">
        <label for="floatingInt">Email: </label>
        <input type="email" class="form-control" id="ValorEmail" placeholder="name@example.com">
      </div>

      <div class="form-floating mb-3 cpf">
        <label for="floatingInt">CPF: </label>
        <input type="" class="form-control" id="ValorInput" placeholder="123.456.789-10">
    </div>

      <div class="form-floating">
        <label for="floatingText">Endereço: </label>
        <textarea class="form-control" placeholder="Coloque seu endereço aqui" id="ValorText"></textarea>
       
     </div>

      <button onclick="soma()">Enviar</button>

  </form> 
  <script src="script.js"></script>   


</body>
</html>
