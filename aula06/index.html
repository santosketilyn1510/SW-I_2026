<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cálculo de Salário</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4); /* gradiente rosa */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2 { text-align: center; }

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #ff6fa1; /* rosa do botão */
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #ff3b82; } /* rosa mais escuro no hover */

.resultado {
    margin-top: 20px;
    padding: 12px;
    background: #ffe6f0; /* rosa claro */
    border-left: 5px solid #ff6fa1; /* borda rosa */
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
}
</style>
<script>
function calcular() {
    var formData = new FormData(document.getElementById('formSalario'));
    fetch('calculo.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById('resultado').innerHTML = data;
    });
    return false; // evita recarregar a página
}
</script>
</head>
<body>

<div class="container">
    <h2>Cálculo de Salário</h2>

    <form id="formSalario" onsubmit="return calcular();">
        Nome:
        <input type="text" name="nome" required>

        Salário:
        <input type="number" name="salario" step="0.01" required>

        Faltas:
        <input type="number" name="faltas" min="0" required>

        <button type="submit">Calcular</button>
    </form>

    <div id="resultado" class="resultado"></div>
</div>

</body>
</html>
